:root{
  --cell:60px; --gap:6px;
  --bg:#fff7ec; --panel:#fffdf9; --ink:#4a3b2a;
  --line:#e7b84a; --cellbg:#fff; --cellborder:#f0dcae;
  --sel:#ffcf4d; --ok:#7bc47f; --mirror:#c98a2b;
  --btn:#ffd97a; --btn2:#ffe9b0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:'Sarabun',system-ui,'Thonburi',sans-serif;
  background:linear-gradient(160deg,#fff7ec,#ffeecf);
  color:var(--ink); overflow-x:hidden;
  display:flex; flex-direction:column; align-items:center;
  min-height:100%;
}
header{
  width:100%; max-width:1000px; padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
#lvlLabel{font-size:22px; font-weight:700;}
#stars{font-size:22px; letter-spacing:2px; flex:1; text-align:center; color:#f0b429;}
.gear{
  border:none; background:var(--btn2); width:44px; height:44px; border-radius:50%;
  font-size:22px; cursor:pointer; box-shadow:0 2px 0 #e6cf94;
}
.gear:active{transform:translateY(2px); box-shadow:none;}

#prompt{font-size:19px; min-height:26px; margin:2px 0 8px; font-weight:700; color:#6b5636;}

#board{display:flex; align-items:center; justify-content:center; gap:2px; padding:6px 10px 16px;}
#board.axisV{flex-direction:row;}
#board.axisH{flex-direction:column;}

.grid{
  display:grid; grid-template-columns:repeat(5,var(--cell));
  grid-template-rows:repeat(5,var(--cell)); gap:var(--gap);
  background:#fdeecd; padding:var(--gap); border-radius:14px;
}
.cell{
  width:var(--cell); height:var(--cell); background:var(--cellbg);
  border:2px solid var(--cellborder); border-radius:10px;
  display:flex; align-items:center; justify-content:center; position:relative;
  overflow:hidden;
}
.cell img{width:88%; height:88%; object-fit:contain; pointer-events:none; display:block;}
.grid.source .cell.has{cursor:pointer;}
.grid.source .cell.sel{outline:4px solid var(--sel); outline-offset:-2px; background:#fff6dd;}
.grid.source .cell.done{opacity:.5;}
.cell .check{
  position:absolute; right:2px; top:0; font-size:26px; color:var(--ok);
  text-shadow:0 1px 2px #fff,0 0 3px #fff; font-weight:700;
}
.grid.answer .cell{cursor:pointer;}
.grid.answer .cell.filled{cursor:default; background:#f4fff0;}

.mirror{background:transparent; display:flex; align-items:center; justify-content:center; position:relative;}
#board.axisV .mirror{width:34px; align-self:stretch;}
#board.axisH .mirror{height:34px; align-self:stretch; width:100%;}
.mirror .line{background:repeating-linear-gradient(var(--dirg),var(--mirror) 0 12px,transparent 12px 22px);}
#board.axisV .mirror .line{--dirg:180deg; width:6px; height:100%; border-radius:3px;}
#board.axisH .mirror .line{--dirg:90deg; height:6px; width:100%; border-radius:3px;}
.mirror .icn{position:absolute; font-size:20px; background:var(--bg); padding:2px; border-radius:6px;}

#gridLabels{display:none;}

/* ---- modal เลือกทิศ ---- */
.overlay{
  position:fixed; inset:0; background:rgba(70,50,20,.35);
  display:none; align-items:center; justify-content:center; z-index:40; padding:16px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--panel); border-radius:22px; padding:18px 20px 22px;
  box-shadow:0 12px 40px rgba(120,80,20,.3); text-align:center; max-width:440px; width:100%;
}
.modal h3{margin:2px 0 14px; font-size:20px; color:#6b5636;}
#dirRef{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;font-size:17px;color:#8a7147;}
#dirRef img{width:64px;height:64px;object-fit:contain;background:#fff;border:2px solid #f0e2c8;border-radius:10px;padding:4px;}
.choices{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.choice{
  border:3px solid #f0dcae; background:#fff; border-radius:18px;
  width:100%; height:118px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 #eadab0;
}
.choice:active{transform:translateY(2px); box-shadow:none;}
.choice img{width:96px; height:96px; object-fit:contain; pointer-events:none;}

/* ---- toast ---- */
#toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
  background:#fff2b8; color:#7a5a10; border:2px solid #f0d879;
  padding:12px 20px; border-radius:16px; font-size:18px; font-weight:700;
  box-shadow:0 6px 18px rgba(150,110,20,.25); opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s; z-index:60; max-width:86vw; text-align:center;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---- praise ---- */
#praise{
  position:fixed; left:50%; top:34%; transform:translateX(-50%) scale(.7);
  font-size:26px; font-weight:700; color:#e07b1a; text-shadow:0 2px 6px #fff;
  opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; z-index:55; text-align:center;
}
#praise.show{opacity:1; transform:translateX(-50%) scale(1);}

/* ---- celebrate / end panels ---- */
.panel{
  position:fixed; inset:0; background:rgba(255,247,236,.96); z-index:50;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px;
}
.panel.show{display:flex;}
.panel h2{font-size:30px; margin:6px 0; color:#e07b1a;}
.panel p{font-size:19px; margin:6px 0;}
.bigbtn{
  border:none; background:var(--btn); color:#5a4419; font-weight:700; font-size:20px;
  padding:14px 30px; border-radius:18px; cursor:pointer; margin-top:16px; box-shadow:0 4px 0 #e6bd55;
}
.bigbtn:active{transform:translateY(3px); box-shadow:none;}
table.stat{border-collapse:collapse; margin:12px auto; font-size:15px; max-width:92vw;}
table.stat th,table.stat td{border:1px solid #e7d3a3; padding:5px 9px;}
table.stat th{background:#ffe9b0;}
.scrollbox{max-height:52vh; overflow:auto; width:100%; max-width:640px;}
.smallbtn{border:none;background:var(--btn2);padding:9px 16px;border-radius:12px;font-weight:700;cursor:pointer;margin:4px;font-family:inherit;color:#5a4419;}
.smallbtn.danger{background:#ffd2c2;color:#8a3a1a;}

/* ---- confetti + sparkle ---- */
.confetti{position:fixed; width:10px; height:16px; top:-20px; z-index:52; border-radius:2px; pointer-events:none;}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:.9;}}
.sparkle{position:absolute; font-size:22px; pointer-events:none; z-index:30; animation:spark .7s ease-out forwards;}
@keyframes spark{0%{transform:scale(.2) translateY(0);opacity:1;}100%{transform:scale(1.4) translateY(-26px);opacity:0;}}
</style>
</head>
<body>
<header>
  <div id="lvlLabel">ข้อ 1/10</div>
  <div id="stars"></div>
  <button class="gear" id="gearBtn" title="สำหรับผู้ใหญ่">⚙️</button>
</header>
<div id="prompt">เลือกรูปฝั่งโจทย์ก่อนนะคะ</div>
<div id="board" class="axisV"></div>

<!-- modal เลือกทิศ -->
<div class="overlay" id="dirOverlay">
  <div class="modal">
    <h3>หัวของน้องชี้ไปทางไหนในกระจกคะ?</h3>
    <div id="dirRef"></div>
    <div class="choices" id="dirChoices"></div>
  </div>
</div>

<!-- celebrate ระหว่างข้อ -->
<div class="panel" id="celebrate">
  <div style="font-size:56px">🎉</div>
  <h2 id="celebTitle">เย่! ทำครบข้อนี้แล้ว</h2>
  <p id="celebSub"></p>
  <button class="bigbtn" id="nextBtn">ข้อต่อไป →</button>
</div>

<!-- จบเกม -->
<div class="panel" id="endPanel">
  <div style="font-size:56px">🌈</div>

  const base = BASE_FACING[char]||'L';
  // แปลงให้คิดจากฐาน "หันซ้าย" เสมอ
  const preFlip = (base==='R') ? 'scaleX(-1) ' : '';
  const map = { L:'', R:'scaleX(-1)', U:'rotate(-90deg) scaleX(-1)', D:'rotate(90deg) scaleX(-1)' };
  return (preFlip + map[dir]).trim();
}
function charImg(char,dir,cls){
  const t = orientTransform(char,dir);
  return `<img src="${IMG[char]}" style="transform:${t}" class="${cls||''}" alt="">`;
}
/* fix v3 (2026-07-03): ภาพกระจกจริง (geometric mirror) — กระจกสะท้อนทั้งภาพ ไม่ใช่แค่ทิศหัว
   เช่น หมูหัวขึ้น-พุงขวา ส่องกระจกแนวตั้ง = หัวขึ้น-พุงซ้าย (ลำตัวพลิกด้วย)
   V = scaleX(-1) ครอบนอกสุดของภาพที่ orient แล้ว, H = scaleY(-1) */
function mirrorTransform(char,dir,axis){
  const flip = axis==='V' ? 'scaleX(-1)' : 'scaleY(-1)';
  return (flip+' '+orientTransform(char,dir)).trim();
}
function charImgT(char,t,cls){
  return `<img src="${IMG[char]}" style="transform:${t}" class="${cls||''}" alt="">`;
}

/* ============ unit test (รันตอนโหลด) ============ */
(function selfTest(){
  const t=[];
  // V position
  t.push(JSON.stringify(reflectPos('V',1,0))==='[1,4]');
  t.push(JSON.stringify(reflectPos('V',2,3))==='[2,1]');
  // H position
  t.push(JSON.stringify(reflectPos('H',0,2))==='[4,2]');
  t.push(JSON.stringify(reflectPos('H',3,1))==='[1,1]');
  // V dir : L<->R swap, U/D stay
  t.push(reflectDir('V','L')==='R'); t.push(reflectDir('V','R')==='L');
  t.push(reflectDir('V','U')==='U'); t.push(reflectDir('V','D')==='D');
  // H dir : U<->D swap, L/R stay
  t.push(reflectDir('H','U')==='D'); t.push(reflectDir('H','D')==='U');
  t.push(reflectDir('H','L')==='L'); t.push(reflectDir('H','R')==='R');
  const pass=t.every(Boolean);
  console.log('[selftest] reflection '+t.filter(Boolean).length+'/'+t.length+(pass?' PASS':' FAIL'));
  if(!pass) console.error('[selftest] FAILED', t);
})();

/* ============ state ============ */
const SESSION = (function(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
})();
let lvI=0, sel=null, solved=new Set(), stat={}, tStart=0, finishTimer=null;
const runRecords=[]; // สรุปรอบนี้

const $=s=>document.querySelector(s);
const board=$('#board');

function toast(msg){
  const el=$('#toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1700);
}
const PRAISE=["เย่! นับช่องเองได้เลย","ตั้งใจดูจนถูกเลยนะ","ลองใหม่แล้วทำได้ สุดยอดความพยายาม!",
  "ค่อย ๆ คิด แล้วก็ได้จริง ๆ ด้วย!","มองกระจกแล้วคิดตามได้เลยนะ","ไม่ยอมแพ้ จนทำได้เอง 💛"];
function praise(){
  const el=$('#praise'); el.textContent=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1200);
}

/* ---- WebAudio ding ---- */
let AC=null;
function ding(){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(), g=AC.createGain(), o2=AC.createOscillator();
    o.type='sine'; o.frequency.value=880; o2.type='sine'; o2.frequency.value=1320;
    g.gain.setValueAtTime(0.0001,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.22,AC.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.4);
    o.connect(g); o2.connect(g); g.connect(AC.destination);
    o.start(); o2.start(); o.stop(AC.currentTime+0.42); o2.stop(AC.currentTime+0.42);
  }catch(e){}
}
function sparkleAt(cell){
  const syms=['✨','⭐','💫','🌟'];
  for(let i=0;i<5;i++){
    const s=document.createElement('div'); s.className='sparkle'; s.textContent=syms[i%syms.length];
    s.style.left=(10+Math.random()*70)+'%'; s.style.top=(20+Math.random()*40)+'%';
    cell.appendChild(s); setTimeout(()=>s.remove(),750);
  }
}

/* ============ render level ============ */
function curLevel(){ return LEVELS[lvI]; }
function itemAt(items,r,c){ return items.find(it=>it.r===r&&it.c===c); }

function render(){
  const lv=curLevel();
  clearTimeout(finishTimer); $('#celebrate').classList.remove('show'); // กัน timer ค้างข้ามข้อ
  sel=null; solved=new Set(); stat={};
  lv.items.forEach((_,i)=>stat[i]={posMiss:0,dirMiss:0,t0:0});
  $('#lvlLabel').textContent='ข้อ '+(lvI+1)+'/10';
  renderStars();
  setPrompt('เลือกรูปฝั่งโจทย์ก่อนนะคะ');

  board.className = lv.axis==='V' ? 'axisV' : 'axisH';
  board.innerHTML='';
  const source=makeGrid('source'), answer=makeGrid('answer');
  // วางตัวโจทย์ลง source
  lv.items.forEach((it,idx)=>{
    const cell=source.querySelector(`[data-r="${it.r}"][data-c="${it.c}"]`);
    cell.classList.add('has'); cell.dataset.item=idx;
    cell.innerHTML=charImg(it.char,it.dir);
    cell.onclick=()=>selectItem(idx,cell);
  });
  // mirror
  const mirror=document.createElement('div'); mirror.className='mirror';
  mirror.innerHTML='<div class="line"></div><div class="icn">🪞</div>';
  if(lv.axis==='V'){ board.append(source,mirror,answer); }
  else { board.append(source,mirror,answer); }
  board._source=source; board._answer=answer;
}
function makeGrid(kind){
  const g=document.createElement('div'); g.className='grid '+kind;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const cell=document.createElement('div'); cell.className='cell';
    cell.dataset.r=r; cell.dataset.c=c;
    if(kind==='answer') cell.onclick=()=>chooseAnswerCell(r,c,cell);
    g.appendChild(cell);
  }
  return g;
}
function renderStars(){
  let s='';
  for(let i=0;i<10;i++) s+= i<lvI ? '⭐' : '☆';
  $('#stars').textContent=s;
}
function setPrompt(t){ $('#prompt').textContent=t; }

/* ============ flow ============ */
function selectItem(idx,cell){
  if(solved.has(idx)) return;
  sel=idx;
  board._source.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  cell.classList.add('sel');
  if(!stat[idx].t0) stat[idx].t0=Date.now();
  const it=curLevel().items[idx];
  setPrompt('น้อง'+({pig:'หมู',dog:'หมา',fish:'ปลา',duck:'เป็ด',elephant:'ช้าง'}[it.char])+' ไปอยู่ช่องไหนในกระจก? แตะเลือกช่องเลย');
}
function chooseAnswerCell(r,c,cell){
  if(sel===null){ toast('เลือกรูปฝั่งโจทย์ก่อนนะคะ'); return; }
  if(cell.classList.contains('filled')) return;
  const lv=curLevel(), it=lv.items[sel];
  const [tr,tc]=reflectPos(lv.axis,it.r,it.c);
  if(r===tr&&c===tc){
    openDirModal(cell);
  }else{
    stat[sel].posMiss++;
    toast('ลองดูตำแหน่งใหม่อีกทีนะคะ');
  }
}
function openDirModal(targetCell){
  const lv=curLevel(), it=lv.items[sel];
  // fix v3: คำตอบถูก = ภาพกระจกจริง (mirrorTransform), choice ทั้ง 4 = ภาพกระจกจริงหมุน 0/90/180/270°
  // → chirality เท่ากันทุกใบ เด็กตัด choice จากความต่างภาพไม่ได้ ต้องอ่านทิศจริง (เหมือน pipeline เดิม)
  const correctT=mirrorTransform(it.char,it.dir,lv.axis);
  const ks=[0,1,2,3];
  // สุ่มลำดับ (Fisher-Yates)
  for(let i=ks.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ks[i],ks[j]]=[ks[j],ks[i]];}
  const wrap=$('#dirChoices'); wrap.innerHTML='';
  $('#dirOverlay').querySelector('h3').textContent='หัวของน้อง'+
     ({pig:'หมู',dog:'หมา',fish:'ปลา',duck:'เป็ด',elephant:'ช้าง'}[it.char])+'ชี้ไปทางไหนในกระจกคะ?';
  $('#dirRef').innerHTML='โจทย์: '+charImg(it.char,it.dir)+' 🪞';
  ks.forEach(k=>{
    const b=document.createElement('button'); b.className='choice';
    b.innerHTML=charImgT(it.char,(k?('rotate('+(k*90)+'deg) '):'')+correctT);
    b.onclick=()=>{
      if(k===0){
        $('#dirOverlay').classList.remove('show');
        placeSolved(targetCell,it,correctT);
      }else{
        stat[sel].dirMiss++;
        toast('เกือบแล้ว ลองหันดูใหม่อีกทีนะคะ');
      }
    };
    wrap.appendChild(b);
  });
  $('#dirOverlay').classList.add('show');
}
function placeSolved(cell,it,t){
  cell.classList.add('filled');
  cell.innerHTML=charImgT(it.char,t); // ภาพกระจกจริง
  sparkleAt(cell); ding(); praise();
  // mark source done
  const scell=board._source.querySelector(`[data-item="${sel}"]`);
  scell.classList.remove('sel'); scell.classList.add('done');
  const chk=document.createElement('div'); chk.className='check'; chk.textContent='✓';
  scell.appendChild(chk); scell.onclick=null;
  // record
  const st=stat[sel];
  st.sec=Math.max(0,Math.round((Date.now()-(st.t0||Date.now()))/1000));
  solved.add(sel);
  const done=sel; sel=null;
  saveRecord(done);
  if(solved.size===curLevel().items.length){ finishTimer=setTimeout(finishLevel,600); }
  else setPrompt('เลือกรูปฝั่งโจทย์ตัวต่อไปนะคะ');
}

/* ============ persistence ============ */
function saveRecord(idx){
  const it=curLevel().items[idx], st=stat[idx];
  const rec={session:SESSION, ts:new Date().toISOString(), level:lvI+1, item:idx,
             char:it.char, posMiss:st.posMiss, dirMiss:st.dirMiss, sec:st.sec||0};
  runRecords.push(rec);
  try{
    const all=JSON.parse(localStorage.getItem('symgame_v1')||'[]');
    all.push(rec); localStorage.setItem('symgame_v1',JSON.stringify(all));
  }catch(e){}
}

/* ============ celebrate / next ============ */
function confetti(){
  const cols=['#ffb84d','#ff7eb0','#7bc47f','#5ab0e6','#f4d03f','#c49bff'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div'); d.className='confetti';
    d.style.left=Math.random()*100+'vw'; d.style.background=cols[i%cols.length];
    d.style.animation='fall '+(1.6+Math.random()*1.4)+'s linear forwards';
    d.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(d); setTimeout(()=>d.remove(),3400);
  }
}
function finishLevel(){
  if(solved.size!==curLevel().items.length) return; // guard: ข้อยังไม่ครบ อย่าฉลอง
  confetti();
  const recs=runRecords.filter(r=>r.level===lvI+1);
  const tries=recs.reduce((a,r)=>a+r.posMiss+r.dirMiss,0);
  $('#celebSub').textContent = tries===0 ? 'ทำถูกหมดตั้งแต่ครั้งแรกเลย 💛' : 'ค่อย ๆ ลองจนครบเลยนะ เก็บ 1 ดาว ⭐';
  $('#celebTitle').textContent = lvI+1<10 ? 'เย่! ทำครบข้อ '+(lvI+1)+' แล้ว' : 'เย่! ครบข้อสุดท้ายแล้ว';
  $('#nextBtn').textContent = lvI+1<10 ? 'ข้อต่อไป →' : 'ดูสรุป 🌈';
  $('#celebrate').classList.add('show');
}
$('#nextBtn').onclick=()=>{
  $('#celebrate').classList.remove('show');
  if(lvI+1<10){ lvI++; render(); }
  else { showEnd(); }
};

/* ============ end summary ============ */
function summaryTable(records,forKid){
  const byLv={};
  records.forEach(r=>{ (byLv[r.level]=byLv[r.level]||[]).push(r); });
  let h='<table class="stat"><tr><th>ข้อ</th><th>ตัว</th>'+
        (forKid?'<th>ลองตำแหน่ง</th><th>ลองหันทิศ</th>':'<th>posMiss</th><th>dirMiss</th><th>วินาที</th>')+'</tr>';
  Object.keys(byLv).sort((a,b)=>a-b).forEach(l=>{
    byLv[l].forEach((r,i)=>{
      const nm={pig:'หมู',dog:'หมา',fish:'ปลา',duck:'เป็ด',elephant:'ช้าง'}[r.char];
      h+='<tr><td>'+(i===0?('ข้อ '+l):'')+'</td><td>'+nm+'</td>'+
         '<td>'+(forKid?('ลองไป '+(r.posMiss+1)+' ครั้ง'):r.posMiss)+'</td>'+
         '<td>'+(forKid?('ลองไป '+(r.dirMiss+1)+' ครั้ง'):r.dirMiss)+'</td>'+
         (forKid?'':'<td>'+r.sec+'</td>')+'</tr>';
    });
  });
  return h+'</table>';
}
function showEnd(){
  renderStars(); $('#stars').textContent='⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐';
  $('#endTable').innerHTML=summaryTable(runRecords,true);
  $('#endPanel').classList.add('show');
}
$('#replayBtn').onclick=()=>{ $('#endPanel').classList.remove('show'); lvI=0; runRecords.length=0; render(); };

/* ============ adult panel ============ */
$('#gearBtn').onclick=()=>{
  let all=[]; try{ all=JSON.parse(localStorage.getItem('symgame_v1')||'[]'); }catch(e){}
  if(!all.length){ $('#adultTable').innerHTML='<p>ยังไม่มีข้อมูลการเล่นที่บันทึกไว้</p>'; }
  else{
    const bySess={}; all.forEach(r=>{(bySess[r.session]=bySess[r.session]||[]).push(r);});
    let h='<table class="stat"><tr><th>รอบ (session)</th><th>จำนวนตัวที่ทำ</th><th>พลาดตำแหน่งรวม</th><th>พลาดทิศรวม</th><th>เวลารวม(วิ)</th></tr>';
    Object.keys(bySess).sort().reverse().forEach(s=>{
      const rs=bySess[s];
      h+='<tr><td>'+s+'</td><td>'+rs.length+'</td><td>'+rs.reduce((a,r)=>a+r.posMiss,0)+
         '</td><td>'+rs.reduce((a,r)=>a+r.dirMiss,0)+'</td><td>'+rs.reduce((a,r)=>a+(r.sec||0),0)+'</td></tr>';
    });
    $('#adultTable').innerHTML=h+'</table>';
  }
  $('#adultPanel').classList.add('show');
};
$('#closeAdult').onclick=()=>$('#adultPanel').classList.remove('show');
$('#csvBtn').onclick=()=>{
  let all=[]; try{ all=JSON.parse(localStorage.getItem('symgame_v1')||'[]'); }catch(e){}
  const head='session,level,item,char,posMiss,dirMiss,sec';
  const rows=all.map(r=>[r.session,r.level,r.item,r.char,r.posMiss,r.dirMiss,r.sec||0].join(','));
  const csv=head+'\n'+rows.join('\n');
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  const fn='symgame_results_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+'.csv';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=fn; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
};
$('#clearBtn').onclick=()=>{
  if(confirm('ล้างข้อมูลสถิติทั้งหมด? (ย้อนกลับไม่ได้)')){
    localStorage.removeItem('symgame_v1'); $('#adultTable').innerHTML='<p>ล้างข้อมูลแล้ว</p>';
  }
};

/* ============ go ============ */
render();
</script>
